name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-self-hosted:
    runs-on: self-hosted
    timeout-minutes: 30
    outputs:
      skip: ${{ steps.release.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: release
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          homebrew_tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: ${{ github.repository }}

  release-github-hosted:
    needs: release-self-hosted
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      skip: ${{ steps.release.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: release
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          homebrew_tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: ${{ github.repository }}

  cleanup-old-releases:
    needs: [release-self-hosted, release-github-hosted]
    if: |
      always() && (
        (needs.release-self-hosted.result == 'success' && needs.release-self-hosted.outputs.skip != 'true') ||
        (needs.release-github-hosted.result == 'success' && needs.release-github-hosted.outputs.skip != 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
